<div class="container" style="margin-top: 20px;">
  <div class="columns">
    <div class="column" *ngFor="let post of posts">
      <app-card
        [title]="post.title"
        [username]="post.username"
        [content]="post.content"
        [imageUrl]="post.imageUrl">
      </app-card>
    </div>
  </div>
</div>
